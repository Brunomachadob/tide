name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run tests
        run: |
          node --test \
            --test-reporter=spec \
            --test-reporter-destination=stdout \
            --test-reporter=tap \
            --test-reporter-destination=tap-output.txt \
            test/*.test.js

      - name: Write test summary
        if: always()
        run: node test/ci-summary.js
